<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Virtual Art Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0a0a0b; --fg:#fafafa; --muted:#a1a1aa; --accent:#c9a227; --accent-light:#e8c547; --card:rgba(24,24,27,.88); --border:#27272a; }
        * { box-sizing:border-box; } body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--fg); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; margin:0; position:relative; overflow-x:hidden; }
        h1,h2 { font-family:'Playfair Display',serif; } .highlight { color:var(--accent); }
        .bg-atmosphere { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .bg-atmosphere::before { content:""; position:absolute; top:-40%; left:-40%; width:180%; height:180%; background:radial-gradient(circle at 20% 20%, rgba(201,162,39,.10), transparent 30%), radial-gradient(circle at 80% 70%, rgba(201,162,39,.08), transparent 30%); animation:floatBg 16s ease-in-out infinite; }
        @keyframes floatBg { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-2%,2%) scale(1.03)} }
        .signup-card { position:relative; z-index:1; width:100%; max-width:460px; background:var(--card); border:1px solid var(--border); border-radius:28px; padding:32px; backdrop-filter:blur(18px); box-shadow:0 20px 60px rgba(0,0,0,.45); }
        .form-input { width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--border); background:rgba(10,10,11,.8); color:var(--fg); outline:none; }
        .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,162,39,.15); }
        .btn-primary { width:100%; border:none; cursor:pointer; border-radius:12px; padding:14px 16px; font-weight:700; font-size:1rem; background:linear-gradient(135deg,var(--accent),var(--accent-light)); color:#111; margin-top:8px; }
        .toast { position:fixed; bottom:25px; right:25px; background:#18181b; color:white; border:1px solid var(--border); padding:14px 18px; border-radius:12px; z-index:100; opacity:0; transform:translateY(20px); transition:all .3s ease; }
        .toast.show { opacity:1; transform:translateY(0); }
        a { color:var(--accent-light); text-decoration:none; }
    </style>
</head>
<body>
<div class="bg-atmosphere"></div>
<div class="signup-card">
    <div class="text-2xl font-bold mb-5"><span class="highlight">Art</span>Gallery</div>
    <h2 class="text-3xl font-bold mb-2">Create Account</h2>
    <p class="text-zinc-400 mb-6">Join the Virtual Art Gallery platform</p>
    <form id="signupForm">
        <div class="mb-4"><label class="block mb-2" for="fullname">Full Name</label><input type="text" id="fullname" class="form-input" placeholder="Enter your full name" required></div>
        <div class="mb-4"><label class="block mb-2" for="email">Email Address</label><input type="email" id="email" class="form-input" placeholder="Enter your email" required></div>
        <div class="mb-4"><label class="block mb-2" for="password">Password</label><input type="password" id="password" class="form-input" placeholder="Create a password" required></div>
        <div class="mb-4"><label class="block mb-2" for="confirmPassword">Confirm Password</label><input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required></div>
        <button type="submit" class="btn-primary">Sign Up</button>
    </form>
    <p class="text-center text-zinc-400 mt-5">Already have an account? <a href="index.html">Login</a></p>
</div>
<div class="toast" id="toast">Account created successfully</div>
<script>
const signupForm = document.getElementById('signupForm');
const toast = document.getElementById('toast');
signupForm.addEventListener('submit', async function(e) {
  e.preventDefault();
  const fullname = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const confirmPassword = document.getElementById('confirmPassword').value.trim();
  if (!fullname || !email || !password || !confirmPassword) return showToast('Please fill in all fields');
  if (password !== confirmPassword) return showToast('Passwords do not match');
  try {
    const response = await fetch('/api/auth/signup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullname, email, password })
    });
    const data = await response.json();
    if (!response.ok) return showToast(data.message || 'Signup failed');
    localStorage.setItem('galleryUserName', data.fullname);
    localStorage.setItem('galleryUserEmail', data.email);
    showToast('Account created successfully');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } catch (e) {
    showToast('Unable to connect to server');
  }
});
function showToast(message) { toast.textContent = message; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2200); }
</script>
</body>
</html>
